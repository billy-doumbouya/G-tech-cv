<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── SEO de base ──────────────────────────────────── -->
    <title>G-Tech CV – Créez votre CV professionnel en Guinée</title>
    <meta
      name="description"
      content="Créez un CV professionnel en 5 minutes. Choisissez parmi 4 modèles, téléchargez en PDF. Payez avec Orange Money ou MTN MoMo. N°1 en Guinée."
    />
    <meta
      name="keywords"
      content="CV Guinée, créer CV en ligne, CV professionnel Conakry, Orange Money, MTN MoMo, modèle CV"
    />
    <meta name="author" content="G-Tech Academy" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://cv.gtech-academy.gn" />

    <!-- ── Open Graph (Facebook, WhatsApp, LinkedIn) ─────── -->
    <!-- Quand quelqu'un partage votre lien sur WhatsApp ou Facebook,
         ces balises définissent l'image, le titre et la description
         qui apparaissent dans l'aperçu du lien. Sans elles,
         le réseau social affiche n'importe quoi. -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://cv.gtech-academy.gn" />
    <meta
      property="og:title"
      content="G-Tech CV – CV Professionnel en Guinée"
    />
    <meta
      property="og:description"
      content="Créez un CV professionnel en 5 minutes. Payez avec Orange Money ou MTN MoMo."
    />
    <meta
      property="og:image"
      content="https://cv.gtech-academy.gn/og-image.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="fr_GN" />
    <meta property="og:site_name" content="G-Tech CV" />

    <!-- ── Twitter Card ──────────────────────────────────── -->
    <!-- Même principe que Open Graph mais pour Twitter/X.
         summary_large_image affiche une grande image dans le tweet. -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="G-Tech CV – CV Professionnel en Guinée"
    />
    <meta
      name="twitter:description"
      content="Créez un CV professionnel en 5 minutes. Payez avec Orange Money ou MTN MoMo."
    />
    <meta
      name="twitter:image"
      content="https://cv.gtech-academy.gn/og-image.png"
    />

    <!-- ── Favicon complet ───────────────────────────────── -->
    <!-- Un seul favicon.png ne suffit pas sur tous les appareils.
         Voici ce qu'il faut pour couvrir tous les cas. -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <!-- apple-touch-icon : icône qui apparaît quand un utilisateur
         iPhone ajoute votre site à son écran d'accueil. Doit être
         180x180px. Sans elle, iOS prend une capture d'écran laide. -->
    <link rel="manifest" href="/manifest.json" />
    <!-- manifest.json : permet d'installer le site comme une app
         (PWA) sur Android. Couleur de la barre de statut, nom, etc. -->
    <meta name="theme-color" content="#1e2ef5" />
    <!-- theme-color : colore la barre de navigation du navigateur
         sur mobile en bleu brand quand le site est ouvert. Petit
         détail mais très visible sur Android Chrome. -->

    <!-- ── Polices Google (inchangé) ─────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800;900&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
